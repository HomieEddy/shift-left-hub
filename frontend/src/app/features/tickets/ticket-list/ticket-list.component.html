<div class="max-w-4xl mx-auto px-4 py-6">
  <h1 class="text-2xl font-bold text-slate-800 mb-6" i18n="@@tickets.title">My Tickets</h1>

  <div *ngIf="isLoading()" class="text-center py-12 text-slate-500" i18n="@@tickets.loading">Loading tickets...</div>

  <div *ngIf="errorMessage()" class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700 mb-4">
    {{ errorMessage() }}
    <button (click)="loadTickets()" class="ml-2 underline">Retry</button>
  </div>

  <ng-container *ngIf="!isLoading() && !errorMessage()">
    <div class="flex gap-2 mb-4">
      <button
        *ngFor="let filter of ['ALL', 'NEW', 'IN_PROGRESS', 'RESOLVED', 'CANCELLED']"
        (click)="applyFilter(filter)"
        class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors"
        [class.bg-blue-600]="activeFilter() === filter"
        [class.text-white]="activeFilter() === filter"
        [class.bg-slate-100]="activeFilter() !== filter"
        [class.text-slate-600]="activeFilter() !== filter"
        [class.hover:bg-slate-200]="activeFilter() !== filter"
      >
        {{ filter === 'ALL' ? 'All' : statusLabels[filter] }}
      </button>
    </div>

    <div *ngIf="filteredTickets().length === 0" class="text-center py-12 text-slate-500">
      <p i18n="@@tickets.empty">No tickets found</p>
      <a routerLink="/chat" class="text-blue-600 hover:text-blue-700 text-sm mt-2 inline-block" i18n="@@tickets.emptyCTA">
        Ask the AI Assistant
      </a>
    </div>

    <div *ngIf="filteredTickets().length > 0" class="bg-white rounded-lg border border-slate-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr>
            <th class="text-left px-4 py-3 font-medium text-slate-600" i18n="@@tickets.table.ticket">Ticket</th>
            <th class="text-left px-4 py-3 font-medium text-slate-600" i18n="@@tickets.table.category">Category</th>
            <th class="text-left px-4 py-3 font-medium text-slate-600" i18n="@@tickets.table.status">Status</th>
            <th class="text-left px-4 py-3 font-medium text-slate-600" i18n="@@tickets.table.created">Created</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let ticket of filteredTickets()"
            [routerLink]="['/tickets', ticket.id]"
            class="border-b border-slate-100 hover:bg-slate-50 cursor-pointer transition-colors"
          >
            <td class="px-4 py-3 font-mono text-blue-600">{{ ticket.ticketNumber }}</td>
            <td class="px-4 py-3">
              <span class="inline-block px-2 py-0.5 rounded text-xs font-medium" [class]="categoryBadgeClass(ticket.category)">
                {{ categoryLabels[ticket.category] || ticket.category }}
              </span>
            </td>
            <td class="px-4 py-3">
              <span class="inline-block px-2 py-0.5 rounded text-xs font-medium" [class]="statusBadgeClass(ticket.status)">
                {{ statusLabels[ticket.status] || ticket.status }}
              </span>
            </td>
            <td class="px-4 py-3 text-slate-500">{{ ticket.createdAt | date:'medium' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>
</div>
