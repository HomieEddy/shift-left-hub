<div class="bg-white border border-slate-200 rounded-lg p-4 text-sm">
  @if (!successTicketNumber()) {
    <h3 class="font-semibold text-slate-800 mb-3" i18n="@@escalation.title">Escalate to Human Agent</h3>

    <div class="space-y-3">
      <div>
        <label for="escalation-issue" class="block text-xs font-medium text-slate-600 mb-1" i18n="@@escalation.issue">Issue Description</label>
        <textarea
          id="escalation-issue"
          [(ngModel)]="issue"
          data-testid="escalation-issue"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          rows="3"
          [disabled]="isSubmitting()"
        ></textarea>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="escalation-category" class="block text-xs font-medium text-slate-600 mb-1" i18n="@@escalation.category">Category</label>
          <select
            id="escalation-category"
            [(ngModel)]="category"
            data-testid="escalation-category"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [disabled]="isSubmitting()"
          >
            @for (cat of categories; track cat.value) {
              <option [value]="cat.value">{{ cat.label }}</option>
            }
          </select>
        </div>
        <div>
          <label for="escalation-urgency" class="block text-xs font-medium text-slate-600 mb-1" i18n="@@escalation.urgency">Urgency</label>
          <select
            id="escalation-urgency"
            [(ngModel)]="urgency"
            data-testid="escalation-urgency"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [disabled]="isSubmitting()"
          >
            @for (urg of urgencies; track urg.value) {
              <option [value]="urg.value">{{ urg.label }}</option>
            }
          </select>
        </div>
      </div>

      @if (errorMessage()) {
        <div class="text-red-600 text-xs">{{ errorMessage() }}</div>
      }

      <div class="flex gap-2">
        <button
          (click)="submit()"
          [disabled]="isSubmitting() || !issue().trim()"
          data-testid="escalation-submit"
          class="rounded-lg bg-amber-600 px-4 py-2 text-sm text-white hover:bg-amber-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
          @if (isSubmitting()) {
            <span i18n="@@escalation.submitting">Submitting...</span>
          } @else {
            <span i18n="@@escalation.submit">Submit Ticket</span>
          }
        </button>
        <button
          (click)="dismiss()"
          [disabled]="isSubmitting()"
          class="rounded-lg border border-slate-300 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 transition-colors"
          i18n="@@escalation.cancel"
        >
          Cancel
        </button>
      </div>
    </div>
  } @else {
    <div class="text-center py-4">
      <div class="text-green-600 font-semibold mb-1">
        <ng-container i18n="@@escalation.success">Ticket created!</ng-container>
      </div>
      <p class="text-slate-500 text-xs mb-3" i18n="@@escalation.successMessage">
        An agent will review your ticket shortly.
      </p>
      <a routerLink="/tickets" class="text-blue-600 hover:text-blue-700 text-xs font-medium" i18n="@@tickets.view.link">
        View Tickets
      </a>
    </div>
  }
</div>
