<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
    <a routerLink="/" class="inline-block text-sm text-slate-400 hover:text-slate-600 mb-4 transition-colors">&larr; Back to home</a>
    <h1 class="text-2xl font-bold text-center text-slate-800 mb-6">Create Account</h1>

    <p class="text-red-600 text-sm mb-4" *ngIf="errorMessage">{{ errorMessage }}</p>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="displayName" class="block text-sm font-medium text-slate-700 mb-1">Display Name</label>
        <input
          id="displayName"
          type="text"
          [(ngModel)]="displayName"
          name="displayName"
          required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="John Doe"
        />
      </div>

      <div>
        <label for="reg-email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input
          id="reg-email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label for="reg-password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input
          id="reg-password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          (focus)="showPasswordRules = true"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="At least 8 characters"
        />
        <ul class="text-xs mt-1 space-y-1" *ngIf="showPasswordRules">
          <li [class.text-green-600]="password.length >= 8" [class.text-slate-400]="password.length < 8">
            {{ password.length >= 8 ? '✓' : '○' }} At least 8 characters
          </li>
          <li [class.text-green-600]="/[A-Z]/.test(password)" [class.text-slate-400]="!/[A-Z]/.test(password)">
            {{ /[A-Z]/.test(password) ? '✓' : '○' }} One uppercase letter
          </li>
          <li [class.text-green-600]="/[0-9]/.test(password)" [class.text-slate-400]="!/[0-9]/.test(password)">
            {{ /[0-9]/.test(password) ? '✓' : '○' }} One number
          </li>
        </ul>
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="text-center text-sm text-slate-600 mt-6">
      Already have an account?
      <a routerLink="/login" class="text-blue-600 hover:text-blue-800 font-medium">Sign in</a>
    </p>
  </div>
</div>
