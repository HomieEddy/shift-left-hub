<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
    <a routerLink="/" class="inline-block text-sm text-slate-400 hover:text-slate-600 mb-4 transition-colors" i18n="@@login.backToHome">&larr; Back to home</a>
    <h1 class="text-2xl font-bold text-center text-slate-800 mb-6" i18n="@@login.title">Login</h1>

    <p class="text-red-600 text-sm mb-4" *ngIf="errorMessage">{{ errorMessage }}</p>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1" i18n="@@auth.email.label">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          i18n-placeholder="@@auth.email.placeholder" placeholder="you@example.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1" i18n="@@auth.password.label">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="8"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          i18n-placeholder="@@auth.password.placeholder" placeholder="Enter your password"
        />
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        <span *ngIf="isLoading" i18n="@@login.signing-in">Signing in...</span>
        <span *ngIf="!isLoading" i18n="@@login.signin">Sign In</span>
      </button>
    </form>

    <p class="text-center text-sm text-slate-600 mt-6">
      <ng-container i18n="@@login.no-account">Don't have an account?</ng-container>
      <a routerLink="/register" class="text-blue-600 hover:text-blue-800 font-medium" i18n="@@login.registerLink">Register</a>
    </p>
  </div>
</div>
