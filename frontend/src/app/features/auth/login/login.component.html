<div class="min-h-screen flex items-center justify-center bg-surface-secondary px-4">
  <div class="max-w-md w-full bg-surface-primary rounded-2xl shadow-lg border border-border-default p-8">
    <!-- Logo badge -->
    <div class="flex justify-center mb-6">
      <div class="w-12 h-12 bg-primary-600 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-sm">
        SL
      </div>
    </div>

    <h1 class="text-2xl font-bold text-center text-text-primary mb-1" i18n="@@login.title">Login</h1>
    <p class="text-center text-text-secondary text-sm mb-6" i18n="@@login.subtitle">Welcome back</p>

    @if (errorMessage) {
      <div class="bg-accent-danger-muted border border-red-200 text-accent-danger text-sm rounded-xl px-4 py-3 mb-6">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-text-primary mb-1" i18n="@@auth.email.label">Email</label>
        <input
          id="email"
          type="email"
          data-testid="login-email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full bg-surface-primary border border-border-default rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent placeholder:text-text-tertiary"
          i18n-placeholder="@@auth.email.placeholder" placeholder="you@example.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-text-primary mb-1" i18n="@@auth.password.label">Password</label>
        <div class="relative">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            data-testid="login-password"
            [(ngModel)]="password"
            name="password"
            required
            minlength="8"
            class="w-full bg-surface-primary border border-border-default rounded-xl px-4 py-2.5 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent placeholder:text-text-tertiary"
            i18n-placeholder="@@auth.password.placeholder" placeholder="Enter your password"
          />
          <button type="button" (click)="showPassword = !showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-text-tertiary hover:text-text-primary transition-colors" tabindex="-1">
            @if (showPassword) {
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            } @else {
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            }
          </button>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        data-testid="login-submit"
        class="w-full bg-primary-600 text-white py-2.5 px-4 rounded-xl font-medium hover:bg-primary-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm flex items-center justify-center gap-2"
      >
        @if (isLoading) {
          <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span i18n="@@login.signing-in">Signing in...</span>
        } @else {
          <span>{{ translationService.translate('login.signin') }}</span>
        }
      </button>
    </form>

    <p class="text-center text-sm text-text-secondary mt-6">
      <ng-container i18n="@@login.no-account">Don't have an account?</ng-container>
      <a routerLink="/register" class="text-primary-600 hover:text-primary-700 font-medium" i18n="@@login.registerLink">Register</a>
    </p>

    <div class="text-center mt-4">
      <a routerLink="/" class="text-sm text-text-tertiary hover:text-text-primary transition-colors" i18n="@@login.backToHome">Back to home</a>
    </div>
  </div>
</div>
