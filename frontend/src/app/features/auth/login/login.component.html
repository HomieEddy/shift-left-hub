<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
    <a routerLink="/" class="inline-block text-sm text-slate-400 hover:text-slate-600 mb-4 transition-colors">{{ translationService.translate('login.backToHome') }}</a>
    <h1 class="text-2xl font-bold text-center text-slate-800 mb-6">{{ translationService.translate('login.title') }}</h1>

    @if (errorMessage) { <p class="text-red-600 text-sm mb-4">{{ errorMessage }}</p> }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">{{ translationService.translate('auth.email.label') }}</label>
        <input
          id="email"
          type="email"
          data-testid="login-email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          [placeholder]="translationService.translate('auth.email.placeholder')"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">{{ translationService.translate('auth.password.label') }}</label>
        <input
          id="password"
          type="password"
          data-testid="login-password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="8"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          [placeholder]="translationService.translate('auth.password.placeholder')"
        />
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        data-testid="login-submit"
        class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        @if (isLoading) {
          <span>{{ translationService.translate('login.signing-in') }}</span>
        } @else {
          <span>{{ translationService.translate('login.signin') }}</span>
        }
      </button>
    </form>

    <p class="text-center text-sm text-slate-600 mt-6">
      <ng-container>{{ translationService.translate('login.no-account') }}</ng-container>
      <a routerLink="/register" class="text-blue-600 hover:text-blue-800 font-medium">{{ translationService.translate('login.registerLink') }}</a>
    </p>
  </div>
</div>
