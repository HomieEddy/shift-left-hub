<div class="max-w-2xl mx-auto py-8 px-4">
  <div *ngIf="config" class="space-y-6">
    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
      <h1 class="text-xl font-semibold text-slate-800 mb-6">LLM Provider Settings</h1>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Provider</label>
          <select
            [(ngModel)]="config.llmProvider"
            (change)="onProviderChange()"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          >
            <option *ngFor="let p of providers" [value]="p">{{ p }}</option>
          </select>
        </div>

        <div *ngIf="config.llmProvider === 'OLLAMA'">
          <label class="block text-sm font-medium text-slate-700 mb-1">Ollama Endpoint URL</label>
          <input
            [(ngModel)]="config.ollamaEndpointUrl"
            placeholder="http://localhost:11434"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          />
        </div>

        <div *ngIf="config.llmProvider === 'OPENAI'">
          <label class="block text-sm font-medium text-slate-700 mb-1">OpenAI API Key</label>
          <input
            [(ngModel)]="openaiApiKey"
            type="password"
            placeholder="sk-..."
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          />
          <p *ngIf="config.hasOpenaiKey" class="text-xs text-slate-500 mt-1">A key is currently stored. Enter a new key to replace it.</p>
        </div>
      </div>

      <div class="mt-6 space-y-4">
        <h2 class="text-sm font-semibold text-slate-700">Model Configuration</h2>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Chat Model</label>
          <input
            [(ngModel)]="config.chatModelName"
            placeholder="llama3.2"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Embedding Model</label>
          <input
            [(ngModel)]="config.embeddingModelName"
            placeholder="nomic-embed-text"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Similarity Threshold</label>
          <input
            [(ngModel)]="config.similarityThreshold"
            type="number"
            step="0.05"
            min="0"
            max="1"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Embedding Dimension</label>
          <input
            [value]="config.embeddingDimension"
            disabled
            class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm bg-slate-50 text-slate-500"
          />
        </div>
      </div>

      <div class="mt-6 flex items-center gap-3">
        <button
          (click)="save()"
          [disabled]="isSaving"
          class="rounded-lg bg-blue-600 px-4 py-2 text-sm text-white hover:bg-blue-700 disabled:opacity-50"
        >
          {{ isSaving ? 'Saving...' : 'Save Settings' }}
        </button>
        <button
          (click)="testConnection()"
          [disabled]="isTesting"
          class="rounded-lg border border-slate-300 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 disabled:opacity-50"
        >
          {{ isTesting ? 'Testing...' : 'Test Connection' }}
        </button>
      </div>

      <div *ngIf="saveMessage" class="mt-3 bg-green-50 border border-green-200 text-green-700 rounded-lg p-3 text-sm">
        {{ saveMessage }}
      </div>

      <div *ngIf="testResult" class="mt-3" [class.bg-green-50]="testResult.success" [class.border-green-200]="testResult.success" [class.text-green-700]="testResult.success" [class.bg-red-50]="!testResult.success" [class.border-red-200]="!testResult.success" [class.text-red-700]="!testResult.success" class="border rounded-lg p-3 text-sm">
        {{ testResult.message }}
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
      <h2 class="text-sm font-semibold text-slate-700 mb-3">Re-Embed Articles</h2>
      <p class="text-amber-600 text-xs mb-3">This may take a while for large knowledge bases</p>
      <button
        (click)="reindex()"
        [disabled]="isReindexing"
        class="rounded-lg bg-blue-600 px-4 py-2 text-sm text-white hover:bg-blue-700 disabled:opacity-50"
      >
        {{ isReindexing ? 'Re-Embedding...' : 'Re-Embed All Articles' }}
      </button>
    </div>
  </div>
</div>
