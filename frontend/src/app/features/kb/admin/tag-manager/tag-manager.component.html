<div class="p-6 max-w-4xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-slate-800">Tag Management</h1>
    <button
      (click)="openCreate()"
      class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700"
    >
      New Tag
    </button>
  </div>

  <p *ngIf="errorMessage()" class="bg-red-50 text-red-700 px-4 py-3 rounded-lg mb-4">{{ errorMessage() }}</p>

  <!-- Create/Edit Form -->
  <div *ngIf="showForm()" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
    <h3 class="text-lg font-semibold text-slate-800 mb-4">
      {{ editingTag() ? 'Edit Tag' : 'Create Tag' }}
    </h3>
    <div class="grid grid-cols-3 gap-4 mb-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Name (EN)</label>
        <input
          type="text"
          [(ngModel)]="formNameEn"
          required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Name (FR)</label>
        <input
          type="text"
          [(ngModel)]="formNameFr"
          required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Color</label>
        <div class="flex items-center gap-2">
          <input
            type="color"
            [(ngModel)]="formColor"
            class="w-10 h-10 rounded border border-slate-300 cursor-pointer"
          />
          <span class="text-sm text-slate-500">{{ formColor }}</span>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button
        (click)="saveTag()"
        [disabled]="!formNameEn || !formNameFr"
        class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50"
      >
        {{ editingTag() ? 'Update' : 'Create' }}
      </button>
      <button
        (click)="cancelForm()"
        class="px-4 py-2 text-sm text-slate-600 border border-slate-300 rounded-lg hover:bg-slate-50"
      >
        Cancel
      </button>
    </div>
  </div>

  <!-- Tag List -->
  <div *ngIf="isLoading()" class="text-center py-12 text-slate-500">Loading tags...</div>

  <div *ngIf="!isLoading()" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="text-left px-4 py-3 font-medium text-slate-600">Color</th>
          <th class="text-left px-4 py-3 font-medium text-slate-600">Name (EN)</th>
          <th class="text-left px-4 py-3 font-medium text-slate-600">Name (FR)</th>
          <th class="text-left px-4 py-3 font-medium text-slate-600">Articles</th>
          <th class="text-left px-4 py-3 font-medium text-slate-600">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr *ngFor="let tag of tags()" class="hover:bg-slate-50">
          <td class="px-4 py-3">
            <span
              class="inline-block w-6 h-6 rounded border border-slate-200"
              [style.background-color]="tag.color"
            ></span>
          </td>
          <td class="px-4 py-3 font-medium text-slate-800">{{ tag.nameEn }}</td>
          <td class="px-4 py-3 text-slate-600">{{ tag.nameFr }}</td>
          <td class="px-4 py-3">
            <span class="text-slate-600">{{ tag.articleCount }}</span>
          </td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-1">
              <button (click)="openEdit(tag)" class="text-xs px-2 py-1 rounded border border-slate-300 text-slate-600 hover:bg-slate-100">
                Edit
              </button>
              <button (click)="deleteTag(tag.id, tag.nameEn)" class="text-xs px-2 py-1 rounded border border-red-300 text-red-600 hover:bg-red-50">
                Delete
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="tags().length === 0" class="text-center py-8 text-slate-500">
      No tags created yet. Click "New Tag" to add one.
    </p>
  </div>
</div>
