<div class="p-6 max-w-4xl mx-auto">
  <div class="flex items-center justify-end mb-6">
    <div class="flex items-center gap-2">
      <button (click)="cancel()" class="px-4 py-2 text-sm text-slate-600 border border-slate-300 rounded-lg hover:bg-slate-50" i18n="@@admin.articles.cancel">
        Cancel
      </button>
      <button
        (click)="save()"
        [disabled]="isSaving() || !titleEn || !contentEn"
        class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50"
      >
        <ng-container *ngIf="isSaving()" i18n="@@admin.articles.saving">Saving...</ng-container>
        <ng-container *ngIf="!isSaving()" i18n="@@admin.articles.save">Save</ng-container>
      </button>
    </div>
  </div>

  <p *ngIf="errorMessage()" class="bg-red-50 text-red-700 px-4 py-3 rounded-lg mb-4">{{ errorMessage() }}</p>

  <div *ngIf="isLoading()" class="text-center py-12 text-slate-500" i18n="@@admin.articles.loading">Loading article...</div>

  <div *ngIf="!isLoading()" class="space-y-6">
    <!-- Language tabs -->
    <div class="flex items-center gap-1 border-b border-slate-200">
      <button
        (click)="activeTab.set('en')"
        class="px-4 py-2 text-sm font-medium border-b-2 transition-colors"
        [class.border-blue-600.text-blue-600]="activeTab() === 'en'"
        [class.border-transparent.text-slate-500]="activeTab() !== 'en'"
      >
        <ng-container i18n="@@language.english">English</ng-container>
      </button>
      <button
        (click)="activeTab.set('fr')"
        class="px-4 py-2 text-sm font-medium border-b-2 transition-colors"
        [class.border-blue-600.text-blue-600]="activeTab() === 'fr'"
        [class.border-transparent.text-slate-500]="activeTab() !== 'fr'"
      >
        <ng-container i18n="@@language.french">French</ng-container>
      </button>
    </div>

    <!-- English tab -->
    <div *ngIf="activeTab() === 'en'" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" i18n="@@admin.articles.label.title-en">Title (EN)</label>
        <input
          type="text"
          [(ngModel)]="titleEn"
          required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Article title in English" i18n-placeholder="@@admin.articles.placeholder.title-en"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" i18n="@@admin.articles.label.content-en">Content (EN) — Markdown</label>
        <textarea
          [(ngModel)]="contentEn"
          required
          rows="16"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
          placeholder="Write article content in markdown..." i18n-placeholder="@@admin.articles.placeholder.content-en"
        ></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2" i18n="@@admin.articles.label.preview">Preview</label>
        <div class="border border-slate-200 rounded-lg p-4 max-w-none">
          <div class="markdown-content">
            <markdown [data]="contentEn"></markdown>
          </div>
        </div>
      </div>
    </div>

    <!-- French tab -->
    <div *ngIf="activeTab() === 'fr'" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" i18n="@@admin.articles.label.title-fr">Title (FR)</label>
        <input
          type="text"
          [(ngModel)]="titleFr"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Article title in French (optional)" i18n-placeholder="@@admin.articles.placeholder.title-fr"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" i18n="@@admin.articles.label.content-fr">Content (FR) — Markdown</label>
        <textarea
          [(ngModel)]="contentFr"
          rows="16"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
          placeholder="Write article content in French markdown (optional)" i18n-placeholder="@@admin.articles.placeholder.content-fr"
        ></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2" i18n="@@admin.articles.label.preview">Preview</label>
        <div class="border border-slate-200 rounded-lg p-4 max-w-none">
          <div class="markdown-content">
            <markdown [data]="contentFr"></markdown>
          </div>
        </div>
      </div>
    </div>

    <!-- Excerpt & Featured Image -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" i18n="@@admin.articles.label.excerpt">Excerpt</label>
        <textarea
          [(ngModel)]="excerpt"
          rows="3"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          placeholder="Short summary for listings" i18n-placeholder="@@admin.articles.placeholder.excerpt"
        ></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" i18n="@@admin.articles.label.featured-image">Featured Image URL</label>
        <input
          type="text"
          [(ngModel)]="featuredImage"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          placeholder="https://example.com/image.jpg" i18n-placeholder="@@admin.articles.placeholder.featured-image"
        />
      </div>
    </div>

    <!-- Tags Multi-Select -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2" i18n="@@admin.articles.label.tags">Tags</label>
      <div class="flex flex-wrap gap-2">
        <button
          *ngFor="let tag of allTags()"
          (click)="toggleTag(tag.id)"
          class="px-3 py-1 text-xs rounded-full border transition-colors"
          [class.text-white]="selectedTagIds().has(tag.id)"
          [style.background-color]="selectedTagIds().has(tag.id) ? tag.color : 'transparent'"
          [style.border-color]="tag.color"
          [style.color]="selectedTagIds().has(tag.id) ? 'white' : tag.color"
        >
          {{ translationService.currentLang() === 'fr' ? tag.nameFr : tag.nameEn }}
        </button>
      </div>
    </div>
  </div>
</div>
