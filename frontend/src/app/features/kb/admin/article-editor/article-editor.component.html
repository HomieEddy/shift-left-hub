<div class="p-6 max-w-4xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-slate-800">
      {{ isEdit() ? 'Edit Article' : 'New Article' }}
    </h1>
    <div class="flex items-center gap-2">
      <button (click)="cancel()" class="px-4 py-2 text-sm text-slate-600 border border-slate-300 rounded-lg hover:bg-slate-50">
        Cancel
      </button>
      <button
        (click)="save()"
        [disabled]="isSaving() || !titleEn || !contentEn"
        class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50"
      >
        {{ isSaving() ? 'Saving...' : 'Save' }}
      </button>
    </div>
  </div>

  <p *ngIf="errorMessage()" class="bg-red-50 text-red-700 px-4 py-3 rounded-lg mb-4">{{ errorMessage() }}</p>

  <div *ngIf="isLoading()" class="text-center py-12 text-slate-500">Loading article...</div>

  <div *ngIf="!isLoading()" class="space-y-6">
    <!-- Language tabs -->
    <div class="flex items-center gap-1 border-b border-slate-200">
      <button
        (click)="activeTab.set('en')"
        class="px-4 py-2 text-sm font-medium border-b-2 transition-colors"
        [class.border-blue-600.text-blue-600]="activeTab() === 'en'"
        [class.border-transparent.text-slate-500]="activeTab() !== 'en'"
      >
        English
      </button>
      <button
        (click)="activeTab.set('fr')"
        class="px-4 py-2 text-sm font-medium border-b-2 transition-colors"
        [class.border-blue-600.text-blue-600]="activeTab() === 'fr'"
        [class.border-transparent.text-slate-500]="activeTab() !== 'fr'"
      >
        French
      </button>
    </div>

    <!-- English tab -->
    <div *ngIf="activeTab() === 'en'" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Title (EN)</label>
        <input
          type="text"
          [(ngModel)]="titleEn"
          required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Article title in English"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Content (EN) — Markdown</label>
        <textarea
          [(ngModel)]="contentEn"
          required
          rows="16"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
          placeholder="Write article content in markdown..."
        ></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Preview</label>
        <div class="border border-slate-200 rounded-lg p-4 prose prose-sm max-w-none">
          <markdown [data]="contentEn"></markdown>
        </div>
      </div>
    </div>

    <!-- French tab -->
    <div *ngIf="activeTab() === 'fr'" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Title (FR)</label>
        <input
          type="text"
          [(ngModel)]="titleFr"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Article title in French (optional)"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Content (FR) — Markdown</label>
        <textarea
          [(ngModel)]="contentFr"
          rows="16"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
          placeholder="Write article content in French markdown (optional)"
        ></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Preview</label>
        <div class="border border-slate-200 rounded-lg p-4 prose prose-sm max-w-none">
          <markdown [data]="contentFr"></markdown>
        </div>
      </div>
    </div>

    <!-- Excerpt & Featured Image -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Excerpt</label>
        <textarea
          [(ngModel)]="excerpt"
          rows="3"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          placeholder="Short summary for listings"
        ></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Featured Image URL</label>
        <input
          type="text"
          [(ngModel)]="featuredImage"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          placeholder="https://example.com/image.jpg"
        />
      </div>
    </div>

    <!-- Tags Multi-Select -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2">Tags</label>
      <div class="flex flex-wrap gap-2">
        <button
          *ngFor="let tag of allTags()"
          (click)="toggleTag(tag.id)"
          class="px-3 py-1 text-xs rounded-full border transition-colors"
          [class.text-white]="selectedTagIds().has(tag.id)"
          [style.background-color]="selectedTagIds().has(tag.id) ? tag.color : 'transparent'"
          [style.border-color]="tag.color"
          [style.color]="selectedTagIds().has(tag.id) ? 'white' : tag.color"
        >
          {{ translationService.currentLang() === 'fr' ? tag.nameFr : tag.nameEn }}
        </button>
      </div>
    </div>
  </div>
</div>
