<button
  [type]="type()"
  [disabled]="disabled() || loading()"
  (click)="clicked.emit()"
  [attr.aria-disabled]="disabled() || loading()"
  [class]="buttonClasses()"
>
  @if (loading()) {
    <span
      class="inline-block w-4 h-4 border-2 border-current/30 border-t-current rounded-full animate-spin"
    ></span>
  }
  <ng-content />
</button>
