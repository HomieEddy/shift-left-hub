<!-- Navigation header -->
<header class="bg-white border-b border-slate-200 shadow-sm" *ngIf="authService.isAuthenticated()">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-14">
      <!-- Left side: Logo + Navigation -->
      <div class="flex items-center gap-6">
        <span class="text-lg font-bold text-slate-800">SL Knowledge Hub</span>
        <nav class="flex items-center gap-4 text-sm">
          <a
            *ngIf="authService.isAdmin()"
            routerLink="/admin/users"
            routerLinkActive="text-blue-600 font-medium"
            class="text-slate-600 hover:text-slate-800 transition-colors"
          >
            Users
          </a>
        </nav>
      </div>

      <!-- Right side: Language switcher + User info -->
      <div class="flex items-center gap-4">
        <!-- Language Switcher (D-23) -->
        <div class="flex items-center border border-slate-200 rounded-lg overflow-hidden text-sm">
          <button
            (click)="switchLanguage('en')"
            class="px-3 py-1 transition-colors"
            [class.bg-blue-600]="translationService.currentLang() === 'en'"
            [class.text-white]="translationService.currentLang() === 'en'"
            [class.text-slate-600]="translationService.currentLang() !== 'en'"
            [class.hover:bg-slate-100]="translationService.currentLang() !== 'en'"
          >
            EN
          </button>
          <button
            (click)="switchLanguage('fr')"
            class="px-3 py-1 transition-colors"
            [class.bg-blue-600]="translationService.currentLang() === 'fr'"
            [class.text-white]="translationService.currentLang() === 'fr'"
            [class.text-slate-600]="translationService.currentLang() !== 'fr'"
            [class.hover:bg-slate-100]="translationService.currentLang() !== 'fr'"
          >
            FR
          </button>
        </div>

        <!-- User info & logout -->
        <span class="text-sm text-slate-600">{{ authService.user()?.displayName }}</span>
        <button
          (click)="authService.logout().subscribe()"
          class="text-sm text-slate-500 hover:text-red-600 transition-colors"
        >
          Logout
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Main content -->
<main>
  <router-outlet />
</main>
