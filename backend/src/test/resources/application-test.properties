# Test profile — Testcontainers JDBC URL auto-starts pgvector PostgreSQL container
spring.datasource.url=jdbc:tc:pgvector:0.8.0-pg16:///testdb
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:create-tsv-trigger.sql
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# AI — fully mocked in unit tests, disabled in integration tests
spring.ai.ollama.base-url=http://localhost:11435
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
app.ai.encryption-key=test-encryption-key-for-integration-tests
app.jwt.secret=test-only-256-bit-secret-do-not-reuse-anywhere-else-0a8f3c2e1b9d4f5a
app.rate-limiting.enabled=false
app.auth.cookie.secure=false
app.auth.cookie.same-site=Lax
