# Test profile — Testcontainers provides a dynamic PostgreSQL connection
# Disabled by default; AbstractIntegrationTest activates via @ServiceConnection
spring.datasource.url=jdbc:tc:pgvector:0.8.0-pg16:///testdb
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# AI — fully mocked in unit tests, disabled in integration tests
spring.ai.ollama.base-url=http://localhost:11435
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
