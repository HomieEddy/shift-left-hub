spring.application.name=knowledge-hub
server.port=${PORT:8080}

# Default profile - localhost PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/shiftleft
spring.datasource.username=${DB_USERNAME:shiftleft}
spring.datasource.password=${DB_PASSWORD:shiftleft}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
logging.level.org.flywaydb=DEBUG
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Flyway — Schema migration
# ============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=public
# Railway uses a fresh Postgres database, so run the full migration chain.
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ============================================
# HikariCP — Connection pool
# ============================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.minimum-idle=2

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=604800000
app.auth.cookie.secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie.same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}

# AI Config
app.ai.encryption-key=${APP_AI_ENCRYPTION_KEY}
app.ai.encryption-salt=${APP_AI_ENCRYPTION_SALT:ShiftLeftKBSalt}
spring.ai.ollama.base-url=http://host.docker.internal:11434
spring.ai.openai.embedding.enabled=false
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration,org.springframework.ai.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration

# Embedding provider (env-variable-based, not DB)
# Default to local Ollama; override via APP_EMBEDDING_* env vars in production
app.embedding.provider=${APP_EMBEDDING_PROVIDER:OLLAMA}
app.embedding.endpoint-url=${APP_EMBEDDING_ENDPOINT_URL:http://host.docker.internal:11434}
app.embedding.model=${APP_EMBEDDING_MODEL:nomic-embed-text}
app.embedding.api-key=${APP_EMBEDDING_API_KEY:}

# pgvector store
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=${SPRING_AI_VECTORSTORE_PGVECTOR_DIMENSIONS:${APP_EMBEDDING_DIMENSIONS:768}}
spring.ai.vectorstore.pgvector.schema-name=public
spring.flyway.placeholders.embeddingDimensions=${SPRING_AI_VECTORSTORE_PGVECTOR_DIMENSIONS:${APP_EMBEDDING_DIMENSIONS:768}}

# RFC 9457 ProblemDetails
spring.mvc.problemdetails.enabled=true

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Document Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
app.document.upload.dir=./uploads
app.document.chunk.max-tokens=512
app.document.chunk.overlap-tokens=50
