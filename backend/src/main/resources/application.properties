spring.application.name=knowledge-hub
server.port=8080

# Default profile - localhost PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/shiftleft
spring.datasource.username=shiftleft
spring.datasource.password=shiftleft
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=shiftleft-jwt-secret-key-change-in-production-minimum-256-bits-long
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# Actuator
management.endpoints.web.exposure.include=health
