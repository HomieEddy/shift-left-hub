name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

env:
  SONAR_PROJECT_KEY: HomieEddy_shift-left-hub
  SONAR_ORG: homieeddy
  SONAR_HOST_URL: https://sonarcloud.io

jobs:
  backend-lint:
    name: Backend (Checkstyle + SpotBugs + Compile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Fix Maven wrapper permissions
        run: chmod +x mvnw
        working-directory: backend

      - name: Checkstyle + Compile + SpotBugs
        run: ./mvnw compile spotbugs:check -B
        working-directory: backend

  backend-unit-tests:
    name: Backend (Unit Tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Fix Maven wrapper permissions
        run: chmod +x mvnw
        working-directory: backend

      - name: Run unit tests
        run: ./mvnw test -B -Dtest='!*IntegrationTest, !KnowledgeHubApplicationTests'
        working-directory: backend

  backend-integration-tests:
    name: Backend (Integration Tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Fix Maven wrapper permissions
        run: chmod +x mvnw
        working-directory: backend

      - name: Run integration tests (TestContainers)
        run: ./mvnw test -B -Dtest='*IntegrationTest, KnowledgeHubApplicationTests'
        working-directory: backend

  backend-owasp:
    name: Backend (OWASP Dependency-Check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Fix Maven wrapper permissions
        run: chmod +x mvnw
        working-directory: backend

      - name: OWASP Dependency-Check (advisory)
        run: ./mvnw dependency-check:check -B
        working-directory: backend
        continue-on-error: true

  backend-sonar:
    name: Backend (SonarQube Cloud Scan)
    needs: [backend-unit-tests, backend-integration-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Fix Maven wrapper permissions
        run: chmod +x mvnw
        working-directory: backend

      - name: Run unit tests + JaCoCo report (for Sonar coverage)
        run: ./mvnw test jacoco:report -B -Dtest='!*IntegrationTest, !KnowledgeHubApplicationTests'
        working-directory: backend

      - name: SonarQube Cloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw sonar:sonar -B
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ env.SONAR_ORG }}
          -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
          -Dsonar.token=$SONAR_TOKEN
          -Dsonar.java.binaries=target/classes
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        working-directory: backend
        continue-on-error: true

  frontend:
    name: Frontend (Lint + Test + Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Run ESLint
        run: pnpm lint
        working-directory: frontend

      - name: Run unit tests with coverage
        run: pnpm test
        working-directory: frontend

      - name: Audit npm dependencies
        run: pnpm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

      - name: Build
        run: pnpm build
        working-directory: frontend
