name: Backend / Frontend change
description: For a backend or frontend change that doesn't fit the other templates.
labels: ['tier:unscheduled']
body:
  - type: textarea
    id: problem
    attributes:
      label: What does this change do?
      placeholder: One or two sentences. Reference the AGENTS.md tier or .planning/ phase if applicable.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Approach
      placeholder: Brief description of the design. Atomic commit plan if the change is large.
    validations:
      required: false
  - type: textarea
    id: testing
    attributes:
      label: Testing
      placeholder: Which tests were added or updated? Any new test counts?
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: '`mvn verify` passes (backend) or `pnpm lint && pnpm test` passes (frontend)'
          required: true
        - label: Commit messages follow `type(scope): subject`
          required: true
        - label: No secrets, API keys, or `.env` files in the diff
          required: true
        - label: Branch is rebased on master
          required: true
