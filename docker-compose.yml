services:
  db:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: shiftleft-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: shiftleft
      POSTGRES_USER: shiftleft
      POSTGRES_PASSWORD: shiftleft
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftleft -d shiftleft"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: shiftleft-backend
    ports:
      - "8082:8080"
    command: ["./mvnw", "-Pdocker", "-Dcheckstyle.skip=true", "-Dmaven.test.skip=true", "spring-boot:run"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shiftleft
      SPRING_DATASOURCE_USERNAME: shiftleft
      SPRING_DATASOURCE_PASSWORD: shiftleft
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-sk-local-dev-placeholder}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@shiftleft.com}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-ShiftLeft!2026}
      APP_AI_ENCRYPTION_KEY: ${APP_AI_ENCRYPTION_KEY:-local-dev-placeholder-key-2026}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
    volumes:
      - ./backend:/app
      - maven_cache:/home/app/.m2
      - backend_target:/app/target
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: shiftleft-frontend
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 1000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
  maven_cache:
  backend_target:
