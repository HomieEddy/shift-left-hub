services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: shiftleft-backend
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5432/shiftleft}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-shiftleft}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-shiftleft}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@shiftleft.com}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: 1s
      SPRING_DEVTOOLS_RESTART_QUIET_PERIOD: 400ms
    volumes:
      - ./backend:/app
      - maven_cache:/home/app/.m2
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: shiftleft-frontend
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 1000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
  maven_cache:
